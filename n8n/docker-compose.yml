version: "3.8"
services:
  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=Asia/Kolkata
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:-changeme-in-production}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      # Point to Django API via Docker network
      - BOUNTY_API_URL=http://web:8000
    volumes:
      - n8n_data:/home/node/.n8n
      - ./workflows:/workflows:ro
    networks:
      - bounty-net
    restart: unless-stopped

volumes:
  n8n_data:

networks:
  bounty-net:
    external: true
    name: bounty-hunter-agent_default
